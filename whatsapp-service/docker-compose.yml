version: '3.8'

services:
  whatsapp-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: whatsapp-service-24-7
    ports:
      - "3005:3005"
    volumes:
      - ./whatsapp-session-default:/app/whatsapp-session-default
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3005
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    networks:
      - whatsapp-network

networks:
  whatsapp-network:
    driver: bridge
