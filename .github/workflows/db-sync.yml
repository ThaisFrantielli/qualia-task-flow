name: Supabase DB Sync

on:
  schedule:
    # Horarios de Brasilia (BRT/UTC-3): 00:30, 10:30 e 15:30
    # Em UTC: 03:30, 13:30 e 18:30
    - cron: '30 3 * * *'
    - cron: '30 13 * * *'
    - cron: '30 18 * * *'
  workflow_dispatch:

concurrency:
  group: db-sync-main
  cancel-in-progress: true

jobs:
  db-sync:
    name: Sincronizar SQL Server -> Supabase
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 180
    env:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Conectar na Tailscale (opcional)
        if: ${{ env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != '' }}
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: tag:ci-db-sync

      - name: Aviso sem Tailscale
        if: ${{ env.TS_OAUTH_CLIENT_ID == '' || env.TS_OAUTH_SECRET == '' }}
        run: echo "::warning::TS_OAUTH_CLIENT_ID/TS_OAUTH_SECRET ausentes. O acesso ao SQL Server dependera de allowlist publica do runner."
      

      - name: Instalar dependencias ETL
        run: npm --prefix scripts/local-etl install

      - name: Validar acesso ao SQL Server
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_PORT: ${{ secrets.SQL_PORT }}
          SQL_HEALTHCHECK_TIMEOUT_MS: '20000'
          SQL_HEALTHCHECK_MAX_ATTEMPTS: '5'
          SQL_HEALTHCHECK_BACKOFF_MS: '2000'
        run: |
          node - <<'NODE'
          const dns = require('dns').promises;
          const net = require('net');

          const host = process.env.SQL_SERVER;
          const port = Number.parseInt(process.env.SQL_PORT || '3494', 10);
          const timeoutMs = Number.parseInt(process.env.SQL_HEALTHCHECK_TIMEOUT_MS || '20000', 10);
          const maxAttempts = Number.parseInt(process.env.SQL_HEALTHCHECK_MAX_ATTEMPTS || '5', 10);
          const backoffMs = Number.parseInt(process.env.SQL_HEALTHCHECK_BACKOFF_MS || '2000', 10);

          if (!host || Number.isNaN(port) || port <= 0) {
            console.error('❌ SQL_SERVER/SQL_PORT invalidos ou ausentes.');
            process.exit(1);
          }

          if (!Number.isFinite(timeoutMs) || timeoutMs < 1000) {
            console.error('❌ SQL_HEALTHCHECK_TIMEOUT_MS invalido (minimo 1000).');
            process.exit(1);
          }

          if (!Number.isFinite(maxAttempts) || maxAttempts < 1) {
            console.error('❌ SQL_HEALTHCHECK_MAX_ATTEMPTS invalido (minimo 1).');
            process.exit(1);
          }

          if (!Number.isFinite(backoffMs) || backoffMs < 0) {
            console.error('❌ SQL_HEALTHCHECK_BACKOFF_MS invalido (minimo 0).');
            process.exit(1);
          }

          const resolvedHost = async () => {
            if (net.isIP(host)) return host;
            try {
              const [first] = await dns.lookup(host, { all: true });
              return first?.address || host;
            } catch {
              return host;
            }
          };

          const tryConnect = () => {
            attempt += 1;
            process.stdout.write(`Tentativa ${attempt}/${maxAttempts} em SQL_SERVER:${port}... `);

            const socket = net.createConnection({ host, port });
            let settled = false;

            const finish = (ok, reason) => {
              if (settled) return;
              settled = true;
              socket.destroy();

              if (ok) {
                console.log('OK');
                process.exit(0);
                return;
              }

              if (attempt < maxAttempts) {
                console.log(`falhou (${reason}), tentando novamente...`);
                setTimeout(tryConnect, backoffMs * attempt);
                return;
              }

              console.error(`falhou (${reason}).`);
              console.error('❌ Nao foi possivel alcancar o SQL Server. Verifique firewall/allowlist, SQL_SERVER/SQL_PORT e conectividade de rede.');
              console.error('💡 Dica: se este runner for github-hosted, use Tailscale (TS_OAUTH_*) ou execute em runner self-hosted com acesso a VPN/rede interna.');
              process.exit(1);
            };

            socket.setTimeout(timeoutMs);
            socket.on('connect', () => finish(true));
            socket.on('timeout', () => finish(false, `timeout ${timeoutMs}ms`));
            socket.on('error', (err) => finish(false, err.code || err.message));
          };

          let attempt = 0;
          resolvedHost().then((ip) => {
            console.log(`Host resolvido: ${host} -> ${ip}`);
            tryConnect();
          });
          NODE

      - name: Executar sincronizacao otimizada v3 (parallelized COPY protocol)
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_PORT: ${{ secrets.SQL_PORT }}

          PG_POOLER_HOST: ${{ secrets.PG_POOLER_HOST }}
          PG_POOLER_PORT: ${{ secrets.PG_POOLER_PORT }}
          PG_POOLER_USER: ${{ secrets.PG_POOLER_USER }}

          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_DATABASE: ${{ secrets.PG_DATABASE }}

          HEAVY_PG_POOLER_HOST: ${{ secrets.HEAVY_PG_POOLER_HOST }}
          HEAVY_PG_POOLER_PORT: ${{ secrets.HEAVY_PG_POOLER_PORT }}
          HEAVY_PG_POOLER_USER: ${{ secrets.HEAVY_PG_POOLER_USER }}
          HEAVY_PG_PASSWORD: ${{ secrets.HEAVY_PG_PASSWORD }}
          HEAVY_PG_DATABASE: ${{ secrets.HEAVY_PG_DATABASE }}

          PG_POOL_MAX: '3'
          HEAVY_PG_POOL_MAX: '3'
          ETL_BATCH_SIZE: '1'
          ETL_TABLE_MAX_RETRIES: '3'
          ETL_COPY_CHUNK_SIZE: '50000'

          NODE_OPTIONS: '--max-old-space-size=4096'
        run: node --max-old-space-size=4096 scripts/local-etl/run-sync-v3.js

  notify-failure:
    name: Notificar falha da sincronizacao
    runs-on: ubuntu-latest
    needs: db-sync
    if: ${{ always() && needs.db-sync.result == 'failure' }}
    permissions:
      contents: read
      issues: write

    steps:
      - name: Criar aviso de falha
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[ALERTA] Falha no DB Sync - ${new Date().toISOString()}`;
            const body = [
              'A sincronizacao automatica SQL Server -> Supabase falhou.',
              '',
              `Workflow: ${context.workflow}`,
              `Run: ${runUrl}`,
              `Branch: ${context.ref}`,
              `Trigger: ${context.eventName}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['automation', 'db-sync', 'failure']
            });